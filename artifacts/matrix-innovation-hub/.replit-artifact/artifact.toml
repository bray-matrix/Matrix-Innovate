kind = "web"
previewPath = "/"
title = "Matrix Innovation Hub"
version = "1.0.0"
id = "artifacts/matrix-innovation-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25735

[services.development]
run = "pnpm --filter @workspace/matrix-innovation-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/matrix-innovation-hub", "run", "build" ]
publicDir = "artifacts/matrix-innovation-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25735"
BASE_PATH = "/"
