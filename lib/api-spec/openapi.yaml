openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: initiatives
    description: Innovation initiative operations
  - name: dashboard
    description: Dashboard aggregate operations
  - name: documents
    description: Document library operations
  - name: settings
    description: Admin settings operations
  - name: validations
    description: Validation review checklist operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /initiatives:
    get:
      operationId: listInitiatives
      tags: [initiatives]
      summary: List all initiatives
      responses:
        "200":
          description: A list of initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Initiative"
    post:
      operationId: createInitiative
      tags: [initiatives]
      summary: Create a new initiative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeInput"
      responses:
        "201":
          description: Created initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
  /initiatives/{id}:
    get:
      operationId: getInitiative
      tags: [initiatives]
      summary: Get a single initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateInitiative
      tags: [initiatives]
      summary: Update an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeUpdate"
      responses:
        "200":
          description: Updated initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteInitiative
      tags: [initiatives]
      summary: Delete an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/versions:
    get:
      operationId: listInitiativeVersions
      tags: [initiatives]
      summary: List version history for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version history entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InitiativeVersion"
  /initiatives/{id}/recommendations:
    get:
      operationId: getInitiativeRecommendations
      tags: [initiatives]
      summary: Get Initiative Intelligence recommendations
      description: >
        Deterministic, rule-based recommendations generated by the
        Initiative Intelligence Engine. The engine sits behind a provider
        abstraction so it can later be replaced by an AI-backed provider
        without changing this contract.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated recommendations for the initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiativeRecommendations"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/recalculate:
    post:
      operationId: recalculateInitiative
      tags: [initiatives]
      summary: Recalculate scoring, AI readiness, and priority from stored fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recalculation result with a detailed per-component change explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculationResult"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/calculations:
    get:
      operationId: listCalculationEvents
      tags: [initiatives]
      summary: List the recalculation audit history for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calculation events, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalculationEvent"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/compare:
    get:
      operationId: compareInitiativeVersions
      tags: [initiatives]
      summary: Compare the current version with the previous version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Side-by-side field comparison of current vs previous version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionComparison"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard aggregate metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List governance documents
      responses:
        "200":
          description: A list of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get admin configuration settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
  /settings/ai-provider/test:
    post:
      operationId: testAiProvider
      tags: [settings]
      summary: Run a readiness test against the active AI provider using sample data
      responses:
        "200":
          description: The stored test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderTestEvent"
  /settings/ai-provider/tests:
    get:
      operationId: listAiProviderTests
      tags: [settings]
      summary: List AI provider test history, newest first
      responses:
        "200":
          description: A list of provider test events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProviderTestEvent"
  /backlog:
    get:
      operationId: listBacklogItems
      tags: [backlog]
      summary: List product backlog items, newest first
      responses:
        "200":
          description: A list of backlog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacklogItem"
    post:
      operationId: createBacklogItem
      tags: [backlog]
      summary: Create a product backlog item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacklogItemCreate"
      responses:
        "201":
          description: Created backlog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklogItem"
  /backlog/{id}:
    patch:
      operationId: updateBacklogItem
      tags: [backlog]
      summary: Update a product backlog item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacklogItemUpdate"
      responses:
        "200":
          description: Updated backlog item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklogItem"
        "404":
          description: Backlog item not found
    delete:
      operationId: deleteBacklogItem
      tags: [backlog]
      summary: Delete a product backlog item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Backlog item not found
  /parking-lot:
    get:
      operationId: listParkingLotItems
      tags: [backlog]
      summary: List parking lot items, newest first
      responses:
        "200":
          description: A list of parking lot items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingLotItem"
    post:
      operationId: createParkingLotItem
      tags: [backlog]
      summary: Create a parking lot item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParkingLotItemCreate"
      responses:
        "201":
          description: Created parking lot item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLotItem"
  /parking-lot/{id}:
    patch:
      operationId: updateParkingLotItem
      tags: [backlog]
      summary: Update a parking lot item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParkingLotItemUpdate"
      responses:
        "200":
          description: Updated parking lot item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLotItem"
        "404":
          description: Parking lot item not found
    delete:
      operationId: deleteParkingLotItem
      tags: [backlog]
      summary: Delete a parking lot item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Parking lot item not found
  /product-health:
    get:
      operationId: getProductHealth
      tags: [backlog]
      summary: Product health summary for the dashboard widget
      responses:
        "200":
          description: Product health counts and current version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductHealth"
  /validations:
    get:
      operationId: listValidations
      tags: [validations]
      summary: List validation records, newest first
      responses:
        "200":
          description: A list of validation records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationRecord"
    post:
      operationId: createValidation
      tags: [validations]
      summary: Generate a validation checklist for the current application version
      description: >
        Creates a new validation record for the current application version,
        seeded from the built-in checklist templates covering every feature
        area of the app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationCreate"
      responses:
        "201":
          description: Created validation record with checklist items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /validations/{id}:
    get:
      operationId: getValidation
      tags: [validations]
      summary: Get a validation record with its checklist items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The validation record with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateValidation
      tags: [validations]
      summary: Update validation record header fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationUpdate"
      responses:
        "200":
          description: Updated validation record with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteValidation
      tags: [validations]
      summary: Delete a validation record and its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /validations/{id}/items/{itemId}:
    patch:
      operationId: updateValidationItem
      tags: [validations]
      summary: Update a checklist item result or comments
      description: >
        Updating an item also re-derives the parent record's overall
        validation status and validation date server-side.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationItemUpdate"
      responses:
        "200":
          description: Parent validation record with items after the update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Initiative:
      type: object
      required:
        - id
        - title
        - department
        - submitterName
        - category
        - status
        - executiveSummary
        - problemStatement
        - currentProcess
        - desiredOutcome
        - aiConcept
        - prototypeGoal
        - successMetric
        - estimatedHoursSavedMonthly
        - estimatedRevenueOpportunity
        - estimatedCostSavings
        - customerImpact
        - complianceRisk
        - technicalComplexity
        - aiReadiness
        - businessValue
        - revenuePotential
        - costSavingsScore
        - customerImpactScore
        - strategicAlignment
        - aiReadinessScore
        - prototypeConfidence
        - technicalComplexityPenalty
        - riskPenalty
        - score
        - priority
        - version
        - assignedTeam
        - currentPhase
        - prototypeDay
        - lastReviewedAt
        - nextReviewAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: ["string", "null"]
        executiveSponsor:
          type: ["string", "null"]
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: ["string", "null"]
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        businessValue:
          type: integer
        revenuePotential:
          type: integer
        costSavingsScore:
          type: integer
        customerImpactScore:
          type: integer
        strategicAlignment:
          type: integer
        aiReadinessScore:
          type: integer
        prototypeConfidence:
          type: integer
        technicalComplexityPenalty:
          type: integer
        riskPenalty:
          type: integer
        score:
          type: integer
        priority:
          type: string
        version:
          type: string
        assignedTeam:
          type: ["string", "null"]
        currentPhase:
          type: ["string", "null"]
        prototypeDay:
          type: ["integer", "null"]
        lastReviewedAt:
          type: ["string", "null"]
        nextReviewAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    InitiativeInput:
      type: object
      required:
        - title
        - department
        - submitterName
        - category
        - problemStatement
        - currentProcess
        - desiredOutcome
        - aiConcept
        - prototypeGoal
        - successMetric
      properties:
        title:
          type: string
          minLength: 1
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: string
        executiveSponsor:
          type: string
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: string
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        assignedTeam:
          type: string
        currentPhase:
          type: string
        prototypeDay:
          type: integer
    InitiativeUpdate:
      type: object
      properties:
        title:
          type: string
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: string
        executiveSponsor:
          type: string
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: string
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        businessValue:
          type: integer
        revenuePotential:
          type: integer
        costSavingsScore:
          type: integer
        customerImpactScore:
          type: integer
        strategicAlignment:
          type: integer
        aiReadinessScore:
          type: integer
        prototypeConfidence:
          type: integer
        technicalComplexityPenalty:
          type: integer
        riskPenalty:
          type: integer
        assignedTeam:
          type: string
        currentPhase:
          type: string
        prototypeDay:
          type: integer
        lastReviewedAt:
          type: ["string", "null"]
        nextReviewAt:
          type: ["string", "null"]
        updatedBy:
          type: string
        changeSummary:
          type: string
    InitiativeVersion:
      type: object
      required:
        - id
        - initiativeId
        - version
        - changedBy
        - summary
        - createdAt
      properties:
        id:
          type: integer
        initiativeId:
          type: integer
        version:
          type: string
        changedBy:
          type: string
        summary:
          type: string
        createdAt:
          type: string
    FieldComparison:
      type: object
      required:
        - field
        - label
        - previous
        - current
        - changed
      properties:
        field:
          type: string
        label:
          type: string
        previous:
          type: string
        current:
          type: string
        changed:
          type: boolean
    VersionComparison:
      type: object
      required:
        - available
        - currentVersion
        - previousVersion
        - reason
        - fields
      properties:
        available:
          type: boolean
          description: False when there is no previous version snapshot to compare against
        currentVersion:
          type: string
        previousVersion:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
          description: Human-readable explanation when comparison is unavailable
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldComparison"
    DashboardSummary:
      type: object
      required:
        - totalInitiatives
        - awaitingReview
        - activePrototypes
        - inPilot
        - inProduction
        - averageScore
        - statusCounts
        - recentInitiatives
      properties:
        totalInitiatives:
          type: integer
        awaitingReview:
          type: integer
        activePrototypes:
          type: integer
        inPilot:
          type: integer
        inProduction:
          type: integer
        averageScore:
          type: number
        statusCounts:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        recentInitiatives:
          type: array
          items:
            $ref: "#/components/schemas/Initiative"
    StatusCount:
      type: object
      required:
        - status
        - count
      properties:
        status:
          type: string
        count:
          type: integer
    Document:
      type: object
      required:
        - id
        - title
        - version
        - owner
        - status
      properties:
        id:
          type: integer
        title:
          type: string
        version:
          type: string
        owner:
          type: string
        status:
          type: string
    Settings:
      type: object
      required:
        - departments
        - categories
        - statuses
        - scoringWeights
        - applicationVersion
      properties:
        departments:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
        statuses:
          type: array
          items:
            type: string
        scoringWeights:
          type: array
          items:
            $ref: "#/components/schemas/ScoringWeight"
        applicationVersion:
          type: string
        aiProvider:
          $ref: "#/components/schemas/AIProviderConfig"
    AIProviderConfig:
      type: object
      required:
        - activeProvider
        - activeProviderId
        - providerStatus
        - availableProviders
        - lastProviderTest
        - providerNotes
      properties:
        activeProvider:
          type: string
          description: Source label of the active provider (e.g. "Rule Engine v1")
        activeProviderId:
          type: string
          description: Machine id of the active provider (e.g. "rule-based")
        providerStatus:
          type: string
          enum: [Active, Placeholder]
        availableProviders:
          type: array
          items:
            $ref: "#/components/schemas/AIProviderInfo"
        lastProviderTest:
          type: string
          nullable: true
          description: ISO timestamp of the last provider connectivity test, or null if never run
        providerNotes:
          type: string
    ProviderTestCapabilityResult:
      type: object
      required:
        - capability
        - passed
        - message
      properties:
        capability:
          type: string
