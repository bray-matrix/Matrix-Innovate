openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: initiatives
    description: Innovation initiative operations
  - name: dashboard
    description: Dashboard aggregate operations
  - name: documents
    description: Document library operations
  - name: settings
    description: Admin settings operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /initiatives:
    get:
      operationId: listInitiatives
      tags: [initiatives]
      summary: List all initiatives
      responses:
        "200":
          description: A list of initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Initiative"
    post:
      operationId: createInitiative
      tags: [initiatives]
      summary: Create a new initiative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeInput"
      responses:
        "201":
          description: Created initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
  /initiatives/{id}:
    get:
      operationId: getInitiative
      tags: [initiatives]
      summary: Get a single initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateInitiative
      tags: [initiatives]
      summary: Update an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiativeUpdate"
      responses:
        "200":
          description: Updated initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteInitiative
      tags: [initiatives]
      summary: Delete an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/versions:
    get:
      operationId: listInitiativeVersions
      tags: [initiatives]
      summary: List version history for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version history entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InitiativeVersion"
  /initiatives/{id}/recommendations:
    get:
      operationId: getInitiativeRecommendations
      tags: [initiatives]
      summary: Get Initiative Intelligence recommendations
      description: >
        Deterministic, rule-based recommendations generated by the
        Initiative Intelligence Engine. The engine sits behind a provider
        abstraction so it can later be replaced by an AI-backed provider
        without changing this contract.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated recommendations for the initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiativeRecommendations"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/recalculate:
    post:
      operationId: recalculateInitiative
      tags: [initiatives]
      summary: Recalculate scoring, AI readiness, and priority from stored fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Initiative after recalculation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /initiatives/{id}/compare:
    get:
      operationId: compareInitiativeVersions
      tags: [initiatives]
      summary: Compare the current version with the previous version
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Side-by-side field comparison of current vs previous version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionComparison"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard aggregate metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List governance documents
      responses:
        "200":
          description: A list of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get admin configuration settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Initiative:
      type: object
      required:
        - id
        - title
        - department
        - submitterName
        - category
        - status
        - executiveSummary
        - problemStatement
        - currentProcess
        - desiredOutcome
        - aiConcept
        - prototypeGoal
        - successMetric
        - estimatedHoursSavedMonthly
        - estimatedRevenueOpportunity
        - estimatedCostSavings
        - customerImpact
        - complianceRisk
        - technicalComplexity
        - aiReadiness
        - businessValue
        - revenuePotential
        - costSavingsScore
        - customerImpactScore
        - strategicAlignment
        - aiReadinessScore
        - prototypeConfidence
        - technicalComplexityPenalty
        - riskPenalty
        - score
        - priority
        - version
        - assignedTeam
        - currentPhase
        - prototypeDay
        - lastReviewedAt
        - nextReviewAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        title:
          type: string
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: ["string", "null"]
        executiveSponsor:
          type: ["string", "null"]
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: ["string", "null"]
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        businessValue:
          type: integer
        revenuePotential:
          type: integer
        costSavingsScore:
          type: integer
        customerImpactScore:
          type: integer
        strategicAlignment:
          type: integer
        aiReadinessScore:
          type: integer
        prototypeConfidence:
          type: integer
        technicalComplexityPenalty:
          type: integer
        riskPenalty:
          type: integer
        score:
          type: integer
        priority:
          type: string
        version:
          type: string
        assignedTeam:
          type: ["string", "null"]
        currentPhase:
          type: ["string", "null"]
        prototypeDay:
          type: ["integer", "null"]
        lastReviewedAt:
          type: ["string", "null"]
        nextReviewAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    InitiativeInput:
      type: object
      required:
        - title
        - department
        - submitterName
        - category
        - problemStatement
        - currentProcess
        - desiredOutcome
        - aiConcept
        - prototypeGoal
        - successMetric
      properties:
        title:
          type: string
          minLength: 1
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: string
        executiveSponsor:
          type: string
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: string
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        assignedTeam:
          type: string
        currentPhase:
          type: string
        prototypeDay:
          type: integer
    InitiativeUpdate:
      type: object
      properties:
        title:
          type: string
        department:
          type: string
        submitterName:
          type: string
        businessOwner:
          type: string
        executiveSponsor:
          type: string
        category:
          type: string
        status:
          type: string
        executiveSummary:
          type: string
        problemStatement:
          type: string
        currentProcess:
          type: string
        desiredOutcome:
          type: string
        aiConcept:
          type: string
        prototypeGoal:
          type: string
        successMetric:
          type: string
        estimatedHoursSavedMonthly:
          type: number
        estimatedRevenueOpportunity:
          type: number
        estimatedCostSavings:
          type: number
        customerImpact:
          type: string
        complianceRisk:
          type: string
        technicalComplexity:
          type: string
        aiReadiness:
          type: string
        businessValue:
          type: integer
        revenuePotential:
          type: integer
        costSavingsScore:
          type: integer
        customerImpactScore:
          type: integer
        strategicAlignment:
          type: integer
        aiReadinessScore:
          type: integer
        prototypeConfidence:
          type: integer
        technicalComplexityPenalty:
          type: integer
        riskPenalty:
          type: integer
        assignedTeam:
          type: string
        currentPhase:
          type: string
        prototypeDay:
          type: integer
        lastReviewedAt:
          type: ["string", "null"]
        nextReviewAt:
          type: ["string", "null"]
        updatedBy:
          type: string
        changeSummary:
          type: string
    InitiativeVersion:
      type: object
      required:
        - id
        - initiativeId
        - version
        - changedBy
        - summary
        - createdAt
      properties:
        id:
          type: integer
        initiativeId:
          type: integer
        version:
          type: string
        changedBy:
          type: string
        summary:
          type: string
        createdAt:
          type: string
    FieldComparison:
      type: object
      required:
        - field
        - label
        - previous
        - current
        - changed
      properties:
        field:
          type: string
        label:
          type: string
        previous:
          type: string
        current:
          type: string
        changed:
          type: boolean
    VersionComparison:
      type: object
      required:
        - available
        - currentVersion
        - previousVersion
        - reason
        - fields
      properties:
        available:
          type: boolean
          description: False when there is no previous version snapshot to compare against
        currentVersion:
          type: string
        previousVersion:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
          description: Human-readable explanation when comparison is unavailable
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldComparison"
    DashboardSummary:
      type: object
      required:
        - totalInitiatives
        - awaitingReview
        - activePrototypes
        - inPilot
        - inProduction
        - averageScore
        - statusCounts
        - recentInitiatives
      properties:
        totalInitiatives:
          type: integer
        awaitingReview:
          type: integer
        activePrototypes:
          type: integer
        inPilot:
          type: integer
        inProduction:
          type: integer
        averageScore:
          type: number
        statusCounts:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        recentInitiatives:
          type: array
          items:
            $ref: "#/components/schemas/Initiative"
    StatusCount:
      type: object
      required:
        - status
        - count
      properties:
        status:
          type: string
        count:
          type: integer
    Document:
      type: object
      required:
        - id
        - title
        - version
        - owner
        - status
      properties:
        id:
          type: integer
        title:
          type: string
        version:
          type: string
        owner:
          type: string
        status:
          type: string
    Settings:
      type: object
      required:
        - departments
        - categories
        - statuses
        - scoringWeights
        - applicationVersion
      properties:
        departments:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
        statuses:
          type: array
          items:
            type: string
        scoringWeights:
          type: array
          items:
            $ref: "#/components/schemas/ScoringWeight"
        applicationVersion:
          type: string
    ScoringWeight:
      type: object
      required:
        - name
        - weight
      properties:
        name:
          type: string
        weight:
          type: integer
    SimilarInitiative:
      type: object
      required:
        - id
        - title
        - department
        - category
        - status
        - score
        - similarityScore
        - reasons
      properties:
        id:
          type: integer
        title:
          type: string
        department:
          type: string
        category:
          type: string
        status:
          type: string
        score:
          type: integer
        similarityScore:
          type: integer
          description: Similarity score from 0 to 100
        reasons:
          type: array
          items:
            type: string
    InitiativeRecommendations:
      type: object
      required:
        - initiativeId
        - engine
        - generatedAt
        - similarInitiatives
        - prototypeScope
        - complexity
        - complexityFactors
        - estimatedPrototypeDurationDays
        - teamRoles
        - risks
        - expectedBusinessValue
        - expectedAnnualValue
        - confidenceScore
        - nextAction
      properties:
        initiativeId:
          type: integer
        engine:
          type: string
          description: Identifier of the recommendation provider that produced this result
        generatedAt:
          type: string
          format: date-time
        similarInitiatives:
          type: array
          items:
            $ref: "#/components/schemas/SimilarInitiative"
        prototypeScope:
          type: string
        complexity:
          type: string
          enum: [Low, Medium, High]
        complexityFactors:
          type: array
          items:
            type: string
        estimatedPrototypeDurationDays:
          type: integer
        teamRoles:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        expectedBusinessValue:
          type: string
        expectedAnnualValue:
          type: number
        confidenceScore:
          type: integer
          description: Confidence in the recommendations from 0 to 100
        nextAction:
          type: string
